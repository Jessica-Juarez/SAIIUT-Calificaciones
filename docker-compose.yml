
services:
  # 1. Base de Datos
  db:
    image: postgres:15-alpine
    container_name: ut_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: ut_grades_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - ut_network

  backend:
    build: ./backend
    container_name: ut_backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgres://admin:password123@db:5432/ut_grades_db
      PORT: 5004
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - ut_network

# 3. Frontend (React/Vite)
  frontend:
    build: ./frontend
    container_name: ut_frontend
    restart: on-failure
    ports:
      - "3000:5173" # Accederás por el puerto 3000 en tu navegador
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - ut_network
    stdin_open: true # Necesario para que Vite detecte cambios
    tty: true

volumes:
  postgres_data:

networks:
  ut_network:
    driver: bridge